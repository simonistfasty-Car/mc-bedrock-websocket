<!DOCTYPE html>
<html>
<head>
    <title>Bedrock Control Panel</title>
</head>
<body>
    <h1>?? Bedrock Command Panel</h1>

    <input id="cmd" placeholder="say Hello world" />
    <button onclick="send()">Send</button>

    <pre id="log"></pre>

    <script>
        const ws = new WebSocket(`ws://${location.host}`);

        ws.onmessage = (e) => {
            document.getElementById("log").textContent += e.data + "\n";
        };

        function send() {
            const cmd = document.getElementById("cmd").value;
            ws.send(cmd);
        }
    </script>
</body>
</html>
